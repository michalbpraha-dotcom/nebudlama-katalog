<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nebuď Lama!!</title>

<link rel="stylesheet" href="style.css">
<script src="data.js"></script>

</head>
<body>

<div id="loginScreen">

<div class="loginBox">

<div class="logo">
NEBUĎ<br>LAMA!!
</div>

<div class="subtitle">
Privátní katalog
</div>

<input
id="password"
class="passwordInput"
type="password"
placeholder="Zadej heslo">

<button
class="loginBtn"
onclick="login()">
Vstoupit
</button>

</div>

</div>

<div id="app">

<div class="layout">

<div class="sidebar">

<div class="sidebarHeader">
NEBUĎ LAMA!!
</div>

<div class="searchBox">
<input
id="search"
class="searchInput"
placeholder="🔍 Hledat">
</div>

<div id="menu" class="menu"></div>

</div>

<div class="content">

<div class="topbar">

<div
id="breadcrumb"
class="breadcrumb">
Vyber model
</div>

<button
class="logoutBtn"
onclick="logout()">
Odhlásit
</button>

</div>

<div
id="gallery"
class="gallery">

<div class="photo">
Vyber model vlevo
</div>

</div>

</div>

</div>

</div>

<script>

function login(){

if(
document.getElementById("password").value
==="007"
){

document.getElementById(
"loginScreen"
).style.display="none";

document.getElementById(
"app"
).style.display="block";

}else{

alert("Špatné heslo");

}

}

function logout(){

document.getElementById(
"app"
).style.display="none";

document.getElementById(
"loginScreen"
).style.display="flex";

}

const menu =
document.getElementById("menu");

function renderMenu(filter=""){

menu.innerHTML="";

for(const category in katalog){

const block =
document.createElement("div");

block.className="category";

block.innerHTML=
'<div class="categoryTitle">'+
category+
'</div>';

for(const brand in katalog[category]){

let found=false;

katalog[category][brand]
.forEach(model=>{

if(
model.toLowerCase()
.includes(
filter.toLowerCase()
)
){
found=true;
}

});

if(filter && !found){
continue;
}

const brandDiv=
document.createElement("div");

brandDiv.className="brand";
brandDiv.innerHTML="▶ "+brand;

const models=
document.createElement("div");

models.className="brandModels";

brandDiv.onclick=()=>{

models.style.display=
models.style.display==="block"
?
"none"
:
"block";

};

katalog[category][brand]
.forEach(model=>{

if(
filter &&
!model.toLowerCase()
.includes(
filter.toLowerCase()
)
){
return;
}

const item=
document.createElement("div");

item.className="model";
item.innerText=model;

item.onclick=(e)=>{

e.stopPropagation();

document
.querySelectorAll(".model")
.forEach(m=>
m.classList.remove("active")
);

item.classList.add("active");

document
.getElementById(
"breadcrumb"
)
.innerText=
category+
" / "+
brand+
" / "+
model;

document
.getElementById(
"gallery"
)
.innerHTML=
`
<div class="photo">${model}</div>
<div class="photo">Foto 2</div>
<div class="photo">Foto 3</div>
<div class="photo">Foto 4</div>
`;

};

models.appendChild(item);

});

block.appendChild(brandDiv);
block.appendChild(models);

}

menu.appendChild(block);

}

}

renderMenu();

document
.getElementById("search")
.addEventListener(
"input",
e=>renderMenu(e.target.value)
);

</script>

</body>
</html>
