<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nebuď Lama!!</title>

<link rel="stylesheet" href="style.css">
<script src="data.js"></script>

</head>
<body>

<div id="loginScreen">

<div class="loginBox">

<div class="logo">
NEBUĎ<br>LAMA!!
</div>

<div class="subtitle">
Privátní katalog obuvi, textilu a doplňků
</div>

<input
id="password"
class="passwordInput"
type="password"
placeholder="Zadej heslo">

<button
class="loginBtn"
onclick="login()">
Vstoupit
</button>

</div>

</div>

<div id="app">

<div class="layout">

<div class="sidebar">

<div class="sidebarHeader">
NEBUĎ LAMA!!
</div>

<div class="searchBox">

<input
id="search"
class="searchInput"
placeholder="🔍 Hledat model...">

</div>

<div id="menu" class="menu"></div>

</div>

<div class="content">

<div id="breadcrumb" class="breadcrumb">
Vyber model z menu
</div>

<div id="gallery" class="gallery">

<div class="photo">
Vyber model vlevo
</div>

</div>

</div>

</div>

</div>

<script>

function login(){

const pass =
document.getElementById("password").value;

if(pass==="007"){

document.getElementById("loginScreen").style.display="none";
document.getElementById("app").style.display="block";

}else{

alert("Špatné heslo");

}

}

const menu =
document.getElementById("menu");

function renderMenu(filter=""){

menu.innerHTML="";

for(const category in katalog){

const categoryBlock =
document.createElement("div");

categoryBlock.className =
"category";

const categoryTitle =
document.createElement("div");

categoryTitle.className =
"categoryTitle";

categoryTitle.innerText =
category;

categoryBlock.appendChild(
categoryTitle
);

for(const brand in katalog[category]){

let visible = false;

katalog[category][brand]
.forEach(model=>{

if(
model.toLowerCase()
.includes(
filter.toLowerCase()
)
){
visible = true;
}

});

if(
filter !== "" &&
!visible
){
continue;
}

const brandDiv =
document.createElement("div");

brandDiv.className =
"brand";

brandDiv.innerText =
brand;

const modelsDiv =
document.createElement("div");

modelsDiv.className =
"brandModels";

brandDiv.onclick = ()=>{

modelsDiv.style.display =
modelsDiv.style.display === "block"
?
"none"
:
"block";

};

katalog[category][brand]
.forEach(model=>{

if(
filter !== "" &&
!model.toLowerCase()
.includes(
filter.toLowerCase()
)
){
return;
}

const modelDiv =
document.createElement("div");

modelDiv.className =
"model";

modelDiv.innerText =
model;

modelDiv.onclick =
(e)=>{

e.stopPropagation();

document
.getElementById(
"breadcrumb"
)
.innerText =
category +
" / " +
brand +
" / " +
model;

document
.getElementById(
"gallery"
)
.innerHTML =

`
<div class="photo">
${model}
</div>

<div class="photo">
Fotografie 2
</div>

<div class="photo">
Fotografie 3
</div>
`;

};

modelsDiv.appendChild(
modelDiv
);

});

categoryBlock.appendChild(
brandDiv
);

categoryBlock.appendChild(
modelsDiv
);

}

menu.appendChild(
categoryBlock
);

}

}

renderMenu();

document
.getElementById("search")
.addEventListener(
"input",
(e)=>{

renderMenu(
e.target.value
);

}
);

</script>

</body>
</html>
