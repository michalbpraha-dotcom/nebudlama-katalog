<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nebuď Lama!!</title>

<link rel="stylesheet" href="style.css">

<script src="data.js"></script>

</head>

<body>

<div id="loginScreen">

<div class="loginLeft">

<div style="text-align:center;">

<h1 style="font-size:80px;color:#a855f7;">
NEBUĎ LAMA!!
</h1>

<p style="color:#aaa;font-size:20px;">
Privátní katalog
</p>

<p style="margin-top:30px;color:#666;">
Sem později vložíme obrázek lamy
</p>

</div>

</div>

<div class="loginRight">

<div class="loginBox">

<div class="logo">
NEBUĎ LAMA!!
</div>

<div class="subtitle">
Vstup do katalogu
</div>

<input
id="password"
class="passwordInput"
type="password"
placeholder="Heslo">

<button
class="loginBtn"
onclick="login()">
Vstoupit
</button>

</div>

</div>

</div>

<div id="app">

<div class="layout">

<div class="sidebar">

<div class="sidebarHeader">
NEBUĎ LAMA!!
</div>

<div class="searchBox">

<input
id="search"
class="searchInput"
placeholder="Hledat model...">

</div>

<div id="menu" class="menu"></div>

</div>

<div class="content">

<div id="breadcrumb" class="breadcrumb">
Vyber model z menu
</div>

<div id="gallery" class="gallery">

<div class="photo">
Fotografie doplníš později
</div>

</div>

</div>

</div>

</div>

<script>

function login(){

const pass =
document.getElementById("password").value;

if(pass==="007"){

document.getElementById("loginScreen").style.display="none";
document.getElementById("app").style.display="block";

}else{

alert("Špatné heslo");

}

}

const menu =
document.getElementById("menu");

function renderMenu(filter=""){

menu.innerHTML="";

for(const category in katalog){

const cat=document.createElement("div");
cat.className="category";

cat.innerHTML=
'<div class="categoryTitle">'+
category+
'</div>';

for(const brand in katalog[category]){

let found=false;

katalog[category][brand].forEach(model=>{

if(
model.toLowerCase()
.includes(filter.toLowerCase())
){
found=true;
}

});

if(
filter!=="" &&
!found
){
continue;
}

const brandDiv=
document.createElement("div");

brandDiv.className="brand";
brandDiv.innerText=brand;

const modelsDiv=
document.createElement("div");

modelsDiv.className="brandModels";

brandDiv.onclick=()=>{

modelsDiv.style.display=
modelsDiv.style.display==="block"
?
"none"
:
"block";

};

katalog[category][brand]
.forEach(model=>{

if(
filter!=="" &&
!model.toLowerCase()
.includes(filter.toLowerCase())
){
return;
}

const modelDiv=
document.createElement("div");

modelDiv.className="model";
modelDiv.innerText=model;

modelDiv.onclick=(e)=>{

e.stopPropagation();

document.getElementById(
"breadcrumb"
).innerText=
category+
" / "+
brand+
" / "+
model;

document.getElementById(
"gallery"
).innerHTML=
'<div class="photo">Fotky modelu: '
+
model+
'</div>';

};

modelsDiv.appendChild(modelDiv);

});

cat.appendChild(brandDiv);
cat.appendChild(modelsDiv);

}

menu.appendChild(cat);

}

}

renderMenu();

document
.getElementById("search")
.addEventListener("input",e=>{

renderMenu(e.target.value);

});

</script>

</body>
</html>
