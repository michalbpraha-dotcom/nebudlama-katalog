<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nebuď Lama!!</title>

<meta property="og:image" content="https://nebudlama.online/images/preview.webp">
<meta property="og:url" content="https://nebudlama.online">
<meta property="og:type" content="website">  

<link rel="stylesheet" href="style.css">
<script src="data.js"></script>

</head>
<body>

<div id="loginScreen">

<div class="loginBox">

<div class="logo">
NEBUĎ<br>LAMA!!
</div>

<div class="subtitle">

</div>

<input
id="password"
class="passwordInput"
type="password"
placeholder="Heslo">

<button
class="loginBtn"
onclick="login()">
Vstoupit
</button>

</div>

</div>

<div id="app">

<div class="layout">

<div class="sidebar">

<div class="sidebarHeader">
NEBUĎ LAMA!!
</div>

<div class="searchBox">

<input
id="search"
class="searchInput"
placeholder="🔍 Hledat">

</div>

<div id="menu" class="menu"></div>

</div>

<div class="content">

<div class="topbar">

<div
id="breadcrumb"
class="breadcrumb">
Vyber model
</div>  

<button
class="logoutBtn"
onclick="logout()">
Odhlásit
</button>

</div>

<div
id="gallery"
class="gallery">

<div class="welcomeScreen">

<img
src="images/tapeta.webp"
alt="Nebuď Lama"
class="welcomeImage">

</div>

</div>

</div>

</div>

</div>

<div id="lightbox" class="lightbox">

<div class="closeBtn" onclick="closeLightbox()">
×
</div>

<div class="navBtn prevBtn" onclick="prevImage()">
❮
</div>


<a id="downloadBtn" download>
    ⬇ Stáhnout
</a>
  
<img id="lightboxImage">

<div class="navBtn nextBtn" onclick="nextImage()">
❯
</div>

</div>

<script>

let currentImages=[];
let currentIndex=0;

function login(){

if(
document.getElementById("password").value
==="007"
){

document.getElementById(
"loginScreen"
).style.display="none";

document.getElementById(
"app"
).style.display="block";

}else{

alert("Špatné heslo");

}

}

function logout(){

document.getElementById(
"app"
).style.display="none";

document.getElementById(
"loginScreen"
).style.display="flex";

}

const menu =
document.getElementById("menu");

function getFolderCategory(category){

if(category==="OBUV") return "Obuv";
if(category==="TEXTIL") return "Textil";
if(category==="OSTATNI") return "Ostatni";

return category;

}

function createGallery(category,brand,model){

const gallery =
document.getElementById("gallery");

gallery.innerHTML="";

currentImages=[];

const folderCategory =
getFolderCategory(category);

let imagesFound = 0;

for(let i=1;i<=30;i++){

const number =
String(i).padStart(2,"0");

const imagePath =
`images/${folderCategory}/${brand}/${model}/${number}.webp`;

const img =
document.createElement("img");

img.src=imagePath;

img.className="galleryImage";

img.onload=()=>{

imagesFound++;

currentImages.push(imagePath);

img.onclick=()=>{

openLightbox(
currentImages.indexOf(imagePath)
);

};

};

img.onerror=()=>{

img.remove();

};

gallery.appendChild(img);

}

setTimeout(()=>{

if(imagesFound===0){

gallery.innerHTML=
`
<div class="photo">
Nenalezeny žádné fotografie.<br><br>
Očekávaná cesta:<br>
images/${folderCategory}/${brand}/${model}/01.webp
</div>
`;

}

},1000);

}

function openLightbox(index){

    currentIndex=index;

    document
    .getElementById("lightbox")
    .classList.add("active");

    document
    .getElementById("lightboxImage")
    .src=currentImages[currentIndex];

    document
    .getElementById("downloadBtn")
    .href=currentImages[currentIndex];


}

function closeLightbox(){

document
.getElementById("lightbox")
.classList.remove("active");

}

function nextImage(){

if(currentImages.length===0) return;

currentIndex++;

if(currentIndex>=currentImages.length){
currentIndex=0;
}

document
.getElementById("lightboxImage")
.src=currentImages[currentIndex];

 document
.getElementById("downloadBtn")
.href=currentImages[currentIndex];
  
}


  
function prevImage(){

if(currentImages.length===0) return;

currentIndex--;

if(currentIndex<0){
currentIndex=currentImages.length-1;
}

document
.getElementById("lightboxImage")
.src=currentImages[currentIndex];

}

function renderMenu(filter=""){

menu.innerHTML="";

for(const category in katalog){

const block =
document.createElement("div");

block.className="category";

block.innerHTML=
'<div class="categoryTitle">'+
category+
'</div>';

for(const brand in katalog[category]){

let found=false;

katalog[category][brand]
.forEach(model=>{

if(
model.toLowerCase()
.includes(
filter.toLowerCase()
)
){
found=true;
}

});

if(filter && !found){
continue;
}

const brandDiv=
document.createElement("div");

brandDiv.className="brand";

brandDiv.innerHTML=
"▶ "+brand;

const models=
document.createElement("div");

models.className=
"brandModels";

brandDiv.onclick=()=>{

models.style.display=
models.style.display==="block"
?
"none"
:
"block";

};

katalog[category][brand]
.forEach(model=>{

if(
filter &&
!model.toLowerCase()
.includes(
filter.toLowerCase()
)
){
return;
}

const item=
document.createElement("div");

item.className="model";

item.innerText=model;

item.onclick=(e)=>{

e.stopPropagation();

document
.querySelectorAll(".model")
.forEach(x=>
x.classList.remove("active")
);

item.classList.add("active");

document
.getElementById(
"breadcrumb"
)
.innerText=
category+
" / "+
brand+
" / "+
model;

createGallery(
category,
brand,
model
);

};

models.appendChild(item);

});

block.appendChild(brandDiv);
block.appendChild(models);

}

menu.appendChild(block);

}

}

renderMenu();

document
.getElementById("search")
.addEventListener(
"input",
e=>renderMenu(
e.target.value
)
);

document.addEventListener("keydown",e=>{

if(e.key==="Escape"){
closeLightbox();
}

if(e.key==="ArrowRight"){
nextImage();
}

if(e.key==="ArrowLeft"){
prevImage();
}

});

document
.getElementById("lightbox")
.addEventListener("click",e=>{

if(e.target.id==="lightbox"){
closeLightbox();
}

});

</script>

</body>
</html>
